<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Alfajor</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="icon" href="/static/img/logo.png">
</head>
<body>
  <div id="loading-screen" class="loading-screen">
    <img src="/static/img/logo.png" alt="Alfajor" class="loading-logo">
    <div class="loading-spinner"></div>
    <p>Carregando...</p>
  </div>

  <div class="container" id="app-content" style="opacity:0">
    <div class="header">
      <img src="/static/img/logo.png" alt="Alfajor" class="header-logo">
      <h1>Alfajor</h1>
      <p>Escolha seus sabores e faca seu pedido</p>
    </div>

    <!-- Formulario de pedido -->
    <div id="order-form">
      <div class="card">
        <div class="input-group">
          <label for="name">Seu nome</label>
          <input type="text" id="name" placeholder="Digite seu nome..." autocomplete="given-name">
        </div>
      </div>

      <div class="card">
        <h2>Sabores</h2>
        <div class="product-list" id="product-list">
          <div class="loading">Carregando sabores...</div>
        </div>
      </div>

      <div class="card" id="summary-card" style="display:none">
        <h2>Resumo</h2>
        <div id="summary-items"></div>
        <div class="summary">
          <div class="summary-row total">
            <span>Total</span>
            <span id="summary-total">R$ 0,00</span>
          </div>
        </div>
        <button class="btn btn-primary" id="submit-btn" disabled>Confirmar Pedido</button>
      </div>
    </div>

    <!-- Tela de sucesso -->
    <div id="success-screen" class="success-screen" style="display:none">
      <div class="success-icon">&#10003;</div>
      <h2>Pedido confirmado!</h2>
      <p id="success-name"></p>
      <div id="success-items" class="card"></div>
      <p id="success-total" style="font-weight:800;font-size:22px;color:var(--primary-dark);margin:16px 0"></p>
      <div id="pix-section" class="pix-section" style="display:none">
        <h3>Pague via Pix</h3>
        <p id="pix-value" class="pix-value"></p>
        <div class="pix-copy-box">
          <code id="pix-code"></code>
          <button class="btn btn-sm btn-primary pix-copy-btn" onclick="copyPix()">Copiar</button>
        </div>
        <p class="pix-hint">Copie o codigo e cole no app do seu banco</p>
      </div>
      <div class="success-buttons">
        <button class="btn btn-primary" onclick="newOrder()">Novo Pedido</button>
        <button class="btn btn-outline" onclick="sairFechar()">Sair e Fechar</button>
      </div>
    </div>
  </div>

  <script src="/static/js/customer.js"></script>
  <script>
    function hideLoading() {
      var loading = document.getElementById('loading-screen');
      var content = document.getElementById('app-content');
      content.style.opacity = '1';
      loading.style.opacity = '0';
      setTimeout(function() { loading.style.display = 'none'; }, 400);
    }
  </script>
</body>
</html>
