<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Alfajor - Admin</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="icon" href="/static/img/logo.png">
</head>
<body>
  <div id="loading-screen" class="loading-screen">
    <img src="/static/img/logo.png" alt="Alfajor" class="loading-logo">
    <div class="loading-spinner"></div>
    <p>Carregando...</p>
  </div>

  <div class="container" id="app-content" style="opacity:0">

    <!-- Tela de login -->
    <div id="login-screen">
      <div class="login-box">
        <div class="header">
          <img src="/static/img/logo.png" alt="Alfajor" class="header-logo">
          <h1>Alfajor</h1>
          <p>Painel Administrativo</p>
        </div>
        <div class="card">
          <div class="input-group">
            <label for="password">Senha</label>
            <input type="password" id="password" placeholder="Digite a senha..." autocomplete="current-password">
          </div>
          <button class="btn btn-primary" id="login-btn">Entrar</button>
        </div>
      </div>
    </div>

    <!-- Painel admin -->
    <div id="admin-panel" style="display:none">
      <div class="admin-header">
        <h2>Alfajor</h2>
        <button class="btn btn-sm btn-outline" onclick="logout()">Sair</button>
      </div>

      <!-- Stats -->
      <div class="stats" id="stats">
        <div class="stat-card">
          <div class="stat-value" id="stat-total">-</div>
          <div class="stat-label">Pedidos</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-sold">-</div>
          <div class="stat-label">Vendido</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-paid">-</div>
          <div class="stat-label">Recebido</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-pending">-</div>
          <div class="stat-label">Pendente</div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" data-tab="orders" onclick="switchTab('orders')">Pedidos</button>
        <button class="tab" data-tab="products" onclick="switchTab('products')">Sabores</button>
      </div>

      <!-- Pedidos -->
      <div id="tab-orders" class="tab-content active">
        <div class="filter-bar">
          <button class="filter-btn active" data-filter="all" onclick="filterOrders('all')">Todos</button>
          <button class="filter-btn" data-filter="false" onclick="filterOrders('false')">Pendentes</button>
          <button class="filter-btn" data-filter="true" onclick="filterOrders('true')">Pagos</button>
        </div>
        <div id="orders-list"></div>
      </div>

      <!-- Sabores -->
      <div id="tab-products" class="tab-content">
        <div class="card">
          <h2>Novo Sabor</h2>
          <div class="product-form-row">
            <input type="text" id="new-product-name" placeholder="Nome do sabor">
            <input type="number" id="new-product-price" placeholder="Centavos" min="1" value="600">
          </div>
          <button class="btn btn-primary btn-sm" onclick="createProduct()">Adicionar</button>
        </div>
        <div class="card" style="margin-top:12px">
          <h2>Sabores Ativos</h2>
          <div id="products-list-admin"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/js/admin.js"></script>
  <script>
    window.addEventListener('load', function() {
      var loading = document.getElementById('loading-screen');
      var content = document.getElementById('app-content');
      content.style.opacity = '1';
      loading.style.opacity = '0';
      setTimeout(function() { loading.style.display = 'none'; }, 400);
    });
  </script>
</body>
</html>
